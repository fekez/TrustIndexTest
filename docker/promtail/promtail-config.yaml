server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: symfony
    static_configs:
      - targets:
          - localhost
        labels:
          job: symfony
          app: trustindextest
          env: dev
          __path__: /var/log/symfony/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            message: message
            channel: channel
            datetime: datetime
      - labels:
          level:
          channel:
      - timestamp:
          source: datetime
          format: "2006-01-02T15:04:05.999999+00:00"
          fallback_formats:
            - "2006-01-02T15:04:05+00:00"
