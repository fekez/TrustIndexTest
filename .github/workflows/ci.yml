name: CI

on:
  push:
    branches: [ main, "feature/**" ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: PHP Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - run: find src tests -name "*.php" -exec php -l {} \;

  cs-fixer:
    name: PHP CS Fixer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer
      - run: cp .env.example .env
      - run: composer install --prefer-dist --no-progress
      - run: vendor/bin/php-cs-fixer check --diff

  phpcs:
    name: PHP CodeSniffer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer
      - run: cp .env.example .env
      - run: composer install --prefer-dist --no-progress
      - run: vendor/bin/phpcs

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer
      - run: composer audit

  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest
    needs: [ lint, cs-fixer, phpcs, security ]
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer
      - run: cp .env.example .env
      - run: composer install --prefer-dist --no-progress
      - run: vendor/bin/phpstan analyse

  tests:
    name: PHPUnit
    runs-on: ubuntu-latest
    needs: [ phpstan ]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: trustindex_test
          POSTGRES_USER: app
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer
          extensions: pdo_pgsql
      - name: Map postgres hostname
        run: echo "127.0.0.1 postgres" | sudo tee -a /etc/hosts
      - run: cp .env.example .env
      - run: composer install --prefer-dist --no-progress
      - run: php bin/console doctrine:database:create --env=test --if-not-exists
      - run: php bin/console doctrine:migrations:migrate --no-interaction --allow-no-migration --env=test
      - run: php bin/phpunit --coverage-text
